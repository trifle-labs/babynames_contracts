[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1
solc_version = "0.8.28"
via_ir = true

fs_permissions = [
  { access = "read-write", path = "deployments/" },
  { access = "read-write", path = "previews/" }
]

[profile.default.fuzz]
runs = 512
max_test_rejects = 65536

[profile.ci]
fuzz = { runs = 10000 }

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
tempo = "https://rpc.presto.tempo.xyz"
tempo_testnet = "https://rpc.moderato.tempo.xyz"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=1" }
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11155111" }
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }
tempo = { key = "${TEMPO_EXPLORER_API_KEY}", url = "https://explore.tempo.xyz/api", chain = 4217 }
tempo_testnet = { key = "${TEMPO_EXPLORER_API_KEY}", url = "https://explore.moderato.tempo.xyz/api", chain = 42431 }
