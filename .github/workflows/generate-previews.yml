name: Generate SVG Previews

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-previews:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG previews
        run: node scripts/preview/generate.js

      - name: Convert SVGs to PNGs
        run: |
          sudo apt-get install -y --quiet librsvg2-bin
          for f in previews/*.svg; do
            rsvg-convert -f png -w 800 "$f" -o "${f%.svg}.png"
            echo "Converted: $f -> ${f%.svg}.png"
          done

      - name: Upload SVG + PNG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: svg-previews
          path: previews/
          retention-days: 30

      - name: Post inline previews to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');
            const previewDir = 'previews';
            const prNumber   = context.issue.number;
            const { owner, repo } = context.repo;

            // Upload each PNG to GitHub's issue-attachment CDN.
            // This is the same endpoint used when you drag-and-drop an image into a
            // GitHub comment; it returns https://github.com/user-attachments/assets/…
            // URLs that always render inline in PR markdown.
            const pngFiles = fs.readdirSync(previewDir).filter(f => f.endsWith('.png'));
            if (pngFiles.length === 0) {
              console.log('No PNG previews found, skipping');
              return;
            }

            const assetUrls = {};
            for (const file of pngFiles) {
              const buf = fs.readFileSync(path.join(previewDir, file));
              const res = await fetch(
                `https://uploads.github.com/repos/${owner}/${repo}/issues/${prNumber}/assets` +
                `?name=${encodeURIComponent(file)}`,
                {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${process.env.GH_TOKEN}`,
                    'Content-Type': 'image/png',
                    Accept: 'application/vnd.github+json',
                  },
                  body: buf,
                }
              );
              if (res.ok) {
                const data = await res.json();
                assetUrls[file] = data.browser_download_url;
                console.log(`✓ ${file} -> ${data.browser_download_url}`);
              } else {
                console.error(`✗ ${file}: ${res.status} ${await res.text()}`);
              }
            }

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = '<!-- bet-slip-previews -->';
            let body = `${marker}\n## 🎫 Bet Slip NFT Previews\n\n`;
            body += `SVG art rendered from \`BetSlipSVG.sol\` · [SVG artifacts](${runUrl})\n\n`;
            body += '| Scenario | Preview |\n|---|---|\n';
            for (const file of pngFiles) {
              const name = path.basename(file, '.png').replace(/-/g, ' ');
              if (assetUrls[file]) {
                body += `| ${name} | ![${name}](${assetUrls[file]}) |\n`;
              } else {
                body += `| ${name} | *(upload failed – see [artifacts](${runUrl}))* |\n`;
              }
            }

            // Upsert comment
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

            console.log(`Posted preview comment with ${Object.keys(assetUrls).length} images`);
